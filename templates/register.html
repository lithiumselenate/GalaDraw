<!doctype html>
<html lang="{{ 'zh-CN' if language == 'zh' else 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ t("register.title") }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-panel">
        <div class="login-brand">
          <img src="{{ url_for('static', filename='bee-logo.png') }}" alt="BEE">
          <span>{{ t("register.brand") }}</span>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="messages">
              {% for category, message in messages %}
                <div class="message {{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form method="post">
          <label>
            {{ t("login.username") }}
            <input name="username" autocomplete="username" required autofocus>
          </label>
          <label>
            {{ t("login.password") }}
            <input name="password" type="password" autocomplete="new-password" minlength="8" required>
          </label>
          <button class="primary" type="submit">{{ t("register.submit") }}</button>
        </form>
        <a class="secondary action" href="{{ url_for('login') }}">{{ t("register.back") }}</a>
      </section>
    </main>
  </body>
</html>
