{% extends "base.html" %}

{% block content %}
<div class="page-title">
  <div>
    <p class="eyebrow">访问</p>
    <h1>账户审核</h1>
  </div>
</div>

<section class="panel">
  <table>
    <thead>
      <tr><th>用户名</th><th>申请时间</th><th>操作</th></tr>
    </thead>
    <tbody>
      {% for user in pending_users %}
        <tr>
          <td>{{ user.username }}</td>
          <td>{{ user.created_at.strftime("%Y-%m-%d %H:%M:%S") }}</td>
          <td>
            <div class="table-actions">
              <form class="inline-form" method="post" action="{{ url_for('approve_registration', user_id=user.id) }}">
                <button class="primary" type="submit">批准</button>
              </form>
              <form class="inline-form" method="post" action="{{ url_for('reject_registration', user_id=user.id) }}">
                <button class="danger" type="submit">拒绝</button>
              </form>
            </div>
          </td>
        </tr>
      {% else %}
        <tr><td colspan="3">没有待审核的账户。</td></tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
